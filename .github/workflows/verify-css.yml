# Falla si public/css/partials/ cambió sin regenerar y commitear app.bundle.css
name: Verify CSS bundle

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify-css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Bundle must match partials
        run: npm run verify:css
